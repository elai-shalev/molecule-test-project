---
- name: Create test file to prove role execution
  ansible.builtin.copy:
    content: "Molecule test role executed successfully\n"
    dest: /tmp/molecule_test_marker
    mode: "0644"

- name: Display OS information
  ansible.builtin.debug:
    msg: "Running on {{ ansible_distribution | default('unknown') }} {{ ansible_distribution_version | default('unknown') }}"
