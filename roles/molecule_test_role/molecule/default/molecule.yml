---
driver:
  name: default

platforms:
  - name: molecule-test-instance
    groups:
      - all

provisioner:
  name: ansible
  config_options:
    defaults:
      roles_path: ${MOLECULE_PROJECT_DIRECTORY}/../../
  inventory:
    hosts:
      all:
        hosts:
          molecule-test-instance:
            ansible_connection: local

verifier:
  name: ansible
